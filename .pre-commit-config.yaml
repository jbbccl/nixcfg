# pre-commit hooks for nixcfg
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: nixpkgs-fmt
        name: nixpkgs-fmt
        entry: nixpkgs-fmt
        language: system
        types: [file]
        files: \.nix$

      - id: statix
        name: statix
        entry: statix check
        language: system
        types: [file]
        files: \.nix$
        pass_filenames: false

      - id: deadnix
        name: deadnix
        entry: deadnix --fail -l
        language: system
        types: [file]
        files: \.nix$
        pass_filenames: false
