# ── Environment ──────────────────────────────────────────────
env = XCURSOR_SIZE,27
env = TERM,xterm-kitty
env = TERMINAL,kitty
env = NIXOS_OZONE_WL,1

# ── Monitor ──────────────────────────────────────────────────
monitor = eDP-1,3414x2134@60,auto,1.5
monitor = HDMI-A-1,1920x1080@119.996,1280x0,1

# ── Autostart ────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd --all
exec-once = waybar -c ~/.config/waybar/config-niri.jsonc -s ~/.config/waybar/style.css
exec-once = fcitx5
exec-once = waypaper --restore

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_options = compose:ralt,ctrl:nocaps
    numlock_by_default = true
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

# ── General ──────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2
    "col.active_border" = 0xffffc87f
    "col.inactive_border" = 0xff505050
    layout = dwindle
    cursor_inactive_timeout = 0
}

# ── Dwindle layout tweaks ────────────────────────────────────
dwindle {
    pseudotile = yes
    preserve_split = yes
    force_split = 0
    no_gaps_when_only = 0
    split_width_multiplier = 1.0
}

# ── Decoration ───────────────────────────────────────────────
decoration {
    rounding = 12
    blur {
        enabled = no
    }
    shadow {
        enabled = no
    }
}

# ── Misc ─────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    vfr = on
}

# ── Keybinds ─────────────────────────────────────────────────
$mainMod = SUPER

# Terminal & Apps
bind = $mainMod, T, exec, kitty
bind = $mainMod, B, exec, firefox
bind = $mainMod, E, exec, dolphin
bind = $mainMod, Y, exec, sh -c 'touch $XAUTHORITY; xauth generate "$DISPLAY" .'
bind = $mainMod, R, exec, fuzzel
bind = $mainMod ALT, L, exec, swaylock

# Close & Overview
bind = $mainMod, Q, killactive,
bind = $mainMod, O, overview:toggle

# ── Focus (like niri focus-column / focus-window) ────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u

# ── Move Window ──────────────────────────────────────────────
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, J, movewindow, d
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, down, movewindow, d
bind = $mainMod CTRL, up, movewindow, u

# ── Resize windows (like niri preset-column-widths) ──────────
bind = $mainMod, minus, resizeactive, -50 0
bind = $mainMod, equal, resizeactive, 50 0
bind = $mainMod SHIFT, minus, resizeactive, 0 -50
bind = $mainMod SHIFT, equal, resizeactive, 0 50

# ── Group toggle (like niri tabbed column) ───────────────────
bind = $mainMod, X, togglegroup,

# ── Swap windows ─────────────────────────────────────────────
bind = $mainMod, bracketleft, swapwindow, l
bind = $mainMod, bracketright, swapwindow, r

# ── Workspace (niri-like vertical scrolling) ─────────────────
bind = $mainMod, W, workspace, -1
bind = $mainMod, S, workspace, +1
bind = $mainMod, Page_Up, workspace, -1
bind = $mainMod, Page_Down, workspace, +1

bind = $mainMod CTRL, W, movetoworkspace, -1
bind = $mainMod CTRL, S, movetoworkspace, +1
bind = $mainMod CTRL, Page_Up, movetoworkspace, -1
bind = $mainMod CTRL, Page_Down, movetoworkspace, +1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# ── Mouse wheel workspace switching ──────────────────────────
bind = $mainMod, mouse_down, workspace, +1
bind = $mainMod, mouse_up, workspace, -1

# ── Monitor focus ────────────────────────────────────────────
bind = $mainMod SHIFT, H, focusmonitor, l
bind = $mainMod SHIFT, L, focusmonitor, r
bind = $mainMod SHIFT, left, focusmonitor, l
bind = $mainMod SHIFT, right, focusmonitor, r
bind = $mainMod SHIFT, up, focusmonitor, u
bind = $mainMod SHIFT, down, focusmonitor, d

# ── Fullscreen ───────────────────────────────────────────────
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

# ── Screenshots ──────────────────────────────────────────────
bind = , Print, exec, grim - | wl-copy
bind = CTRL, Print, exec, grim -o "$(hyprctl activeworkspace -j | jq -r .monitor)" - | wl-copy
bind = ALT, Print, exec, grim -g "$(slurp)" - | wl-copy

# ── Media keys ───────────────────────────────────────────────
bind = , xf86audioraisevolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+ -l 1.0
bind = , xf86audiolowervolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bind = , xf86audiomute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , xf86audiomicmute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , xf86audioplay, exec, playerctl play-pause
bind = , xf86audionext, exec, playerctl next
bind = , xf86audioprev, exec, playerctl previous

# ── Backlight ────────────────────────────────────────────────
bind = , xf86monbrightnessup, exec, brightnessctl -c backlight set +10%
bind = , xf86monbrightnessdown, exec, brightnessctl -c backlight set 10%-

# ── Quit / Power ─────────────────────────────────────────────
bind = $mainMod SHIFT, E, exit,
bind = CTRL ALT, Delete, exit,
bind = $mainMod SHIFT, P, exec, hyprctl dispatch dpms off

# ── Window Rules ─────────────────────────────────────────────
windowrulev2 = rounding 12, .*
windowrulev2 = noborder, .*
windowrulev2 = noinitialfocus, class:^(firefox)$
windowrulev2 = noinitialfocus, class:^(code)$
windowrulev2 = noinitialfocus, class:^(dev\.zed\.Zed)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(thunar)$, title:^(重命名)

